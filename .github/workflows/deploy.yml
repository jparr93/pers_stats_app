name: Build and Deploy FUT Stats App to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: stats-app/package.json
      
      - name: Install backend dependencies
        working-directory: ./stats-app
        run: npm install
      
      - name: Install client dependencies and build React
        working-directory: ./stats-app/client
        run: npm install && npm run build
      
      - name: Run linter
        working-directory: ./stats-app
        run: npm run lint
        continue-on-error: true
      
      - name: Run tests
        working-directory: ./stats-app
        run: npm test
        continue-on-error: true
      
      - name: Verify React build output
        run: |
          echo "Checking for React build output:"
          ls -la stats-app/client/build/ || echo "Build folder not found!"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: stats-app/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./deploy-package
      
      - name: Check downloaded structure
        run: |
          echo "Contents of deploy-package:"
          ls -la ./deploy-package/
          echo ""
          echo "Contents of deploy-package recursively:"
          find ./deploy-package -type f | head -20
      
      - name: Create deployment package
        run: |
          cd ./deploy-package
          zip -r app.zip . -x "client/node_modules/*" ".git/*" "client/build/*"
          ls -lah app.zip
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-stats-wusc-001"
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./deploy-package/app.zip
